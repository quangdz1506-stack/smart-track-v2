version: '3.8'

services:
  db:
    image: mysql:8
    container_name: smart_track_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_expense_tracker
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: smart_track_backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=smart_expense_tracker
      - PORT=5000
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: smart_track_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
